name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix. Defaults to Cargo.toml version."
        required: false
        type: string
      publish_release:
        description: "Create a GitHub Release and tag for this manual run."
        required: false
        default: true
        type: boolean
      draft:
        description: "Create the manual GitHub Release as a draft."
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  preflight:
    name: Preflight Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo fmt check
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --workspace --all-targets

      - name: Cargo test
        run: cargo test --workspace --all-targets

  build:
    name: Build (${{ matrix.target }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_label: windows
            arch_label: x86_64
            extension: zip

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_label: linux
            arch_label: x86_64
            extension: tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            os_label: macos
            arch_label: arm64
            extension: tar.gz

    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(grep '^version = ' Cargo.toml | head -n1 | cut -d '"' -f2)
            echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\scripts\package-windows.ps1 -Target "${{ matrix.target }}" -ArchLabel "${{ matrix.arch_label }}" -Version "${{ steps.version.outputs.value }}"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x ./scripts/package-unix.sh
          ./scripts/package-unix.sh "${{ matrix.target }}" "${{ matrix.os_label }}" "${{ matrix.arch_label }}" "${{ steps.version.outputs.value }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: raptrix-cim-rs-${{ matrix.os_label }}-${{ matrix.arch_label }}
          path: dist/raptrix-cim-rs-v${{ steps.version.outputs.value }}-${{ matrix.os_label }}-${{ matrix.arch_label }}.${{ matrix.extension }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' || github.event.inputs.publish_release == 'true'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            DRAFT_VALUE="false"
          else
            VERSION_INPUT="${{ github.event.inputs.version }}"
            if [[ -n "$VERSION_INPUT" ]]; then
              VERSION="$VERSION_INPUT"
            else
              VERSION=$(grep '^version = ' Cargo.toml | head -n1 | cut -d '"' -f2)
            fi
            TAG_NAME="v${VERSION}"
            DRAFT_VALUE="${{ github.event.inputs.draft }}"
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=raptrix-cim-rs ${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "draft=${DRAFT_VALUE}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          draft: ${{ steps.release_meta.outputs.draft }}
          generate_release_notes: false
          files: artifacts/*
