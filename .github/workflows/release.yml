name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_label: windows
            arch_label: x86_64
            extension: zip

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_label: linux
            arch_label: x86_64
            extension: tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            os_label: macos
            arch_label: arm64
            extension: tar.gz

    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(grep '^version = ' Cargo.toml | head -n1 | cut -d '"' -f2)
            echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\scripts\package-windows.ps1 -Target "${{ matrix.target }}" -ArchLabel "${{ matrix.arch_label }}" -Version "${{ steps.version.outputs.value }}"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x ./scripts/package-unix.sh
          ./scripts/package-unix.sh "${{ matrix.target }}" "${{ matrix.os_label }}" "${{ matrix.arch_label }}" "${{ steps.version.outputs.value }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: raptrix-cim-rs-${{ matrix.os_label }}-${{ matrix.arch_label }}
          path: dist/raptrix-cim-rs-v${{ steps.version.outputs.value }}-${{ matrix.os_label }}-${{ matrix.arch_label }}.${{ matrix.extension }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          generate_release_notes: true
          files: artifacts/*
